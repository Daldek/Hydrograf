# Production overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  api:
    environment:
      LOG_LEVEL: WARNING
      ADMIN_API_KEY_FILE: /run/secrets/admin_api_key
      # TODO: DATABASE_URL still interpolates POSTGRES_PASSWORD from .env
      # Migrate to secret-file reading in app code to remove password from env
    secrets:
      - db_password
      - admin_api_key
    # 2 workers for production (no --reload)
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --workers 2

  db:
    environment:
      # In production the db reads the password from the Docker secret file.
      # The base compose still requires POSTGRES_PASSWORD in .env because
      # the api service interpolates it into DATABASE_URL.
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password

  nginx:
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # To enable TLS, uncomment and provide certificates:
  # nginx:
  #   ports:
  #     - "443:443"
  #     - "80:80"
  #   volumes:
  #     - ./frontend:/usr/share/nginx/html:ro
  #     - ./docker/nginx-ssl.conf.template:/etc/nginx/templates/default.conf.template:ro
  #     - ./docker/certs:/etc/nginx/certs:ro
  #   environment:
  #     - SERVER_NAME=${SERVER_NAME:-localhost}
  #     - NGINX_ENVSUBST_FILTER=SERVER_NAME

secrets:
  db_password:
    file: ${SECRETS_DIR:-./secrets}/db_password.txt
  admin_api_key:
    file: ${SECRETS_DIR:-./secrets}/admin_api_key.txt
